<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>রিডাইরেক্টিং...</title>
    <script>
        // বর্তমান URL টি নেওয়া হচ্ছে
        const currentURL = window.location.href;
        const lowerCaseURL = currentURL.toLowerCase();

        // যদি URL-এ বড় হাতের অক্ষর থাকে, তবে ছোট হাতের URL-এ রিডাইরেক্ট করবে
        if (currentURL !== lowerCaseURL) {
            window.location.replace(lowerCaseURL);
        } else {
            // যদি পেজটি আসলেও খুঁজে না পাওয়া যায়, তবে হোমপেজে নিয়ে যাবে (ঐচ্ছিক)
            // window.location.replace("/"); 
        }
    </script>
</head>
<body>
    <p>অপেক্ষা করুন, আপনাকে সঠিক পেজে নিয়ে যাওয়া হচ্ছে...</p>
</body>
</html>
